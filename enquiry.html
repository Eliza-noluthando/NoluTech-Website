<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Website information -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Page title -->
<title>Enquiry - NoluTech Solutions</title>

<!-- Link to external CSS -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header section -->
<header>

    <!-- Website heading -->
    <h1>NoluTech Solutions</h1>

    <!-- Navigation menu -->
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="enquiry.html">Enquiry</a>
        <a href="contact.html">Contact</a>
    </nav>

</header>

<!-- Main content -->
<main>

    <!-- Enquiry section -->
    <section>

        <h2>Send Us an Enquiry</h2>

        <p>
            Complete the form below and we will contact you as soon as possible.
        </p>

        <!-- Enquiry form -->
        <form>

            <!-- Name field -->
            <label for="name">Full Name:</label><br>
            <input type="text" id="name" name="name"><br><br>

            <!-- Email field -->
            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <!-- Service selection -->
            <label for="service">Select Service:</label><br>
            <select id="service" name="service">
                <option>Website Development</option>
                <option>Technical Support</option>
                <option>Software Installation</option>
                <option>Business IT Assistance</option>
            </select><br><br>

            <!-- Message field -->
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5"></textarea><br><br>

            <!-- Submit button -->
            <button type="submit">Submit Enquiry</button>

        </form>

    </section>

</main>

<!-- Footer section -->
<footer>

    <p>© 2026 NoluTech Solutions | All Rights Reserved</p>

</footer>

</body>
</html>
